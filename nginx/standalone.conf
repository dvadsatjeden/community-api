server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index-standalone.html;

    # Serve assets with long cache (filenames are content-hashed)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: all routes → index-standalone.html
    location / {
        try_files $uri $uri/ /index-standalone.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # PWA: correct MIME type for web app manifest
    location ~* \.webmanifest$ {
        add_header Content-Type "application/manifest+json";
        try_files $uri =404;
    }

    # Service worker must be served from root scope with no-cache
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/wasm application/manifest+json;
}
