services:
  community-api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: community-api
    restart: unless-stopped
    env_file: .env
    expose:
      - "3021"
    volumes:
      - ./data:/app/data
    networks:
      - internal
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=passbolt_default"
      - "traefik.http.routers.community-api.rule=Host(`api.dvadsatjeden.org`)"
      - "traefik.http.routers.community-api.entrypoints=websecure"
      - "traefik.http.routers.community-api.tls=true"
      - "traefik.http.routers.community-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.community-api.loadbalancer.server.port=3021"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3021/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 20s

networks:
  internal:
    driver: bridge
  traefik_proxy:
    external: true
    name: passbolt_default